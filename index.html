<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FRI Campus Tree Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <!-- Our stylesheet -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <h1>FRI Campus Tree Map</h1>
      <p>Search and filter tree locations across the Forest Research Institute campus.</p>
    </div>
  </header>

  <main>
    <section class="section section-controls">
      <div class="section-inner controls-row">
        <!-- Search input -->
        <input
          type="text"
          id="search-input"
          class="search-input"
          placeholder="Search by botanical name, common name, or location in campus"
        />

        <!-- Family filter -->
        <select id="family-filter" class="filter-select">
          <option value="">Family (all)</option>
        </select>

        <!-- Potential Use filter -->
        <select id="use-filter" class="filter-select">
          <option value="">Potential use (all)</option>
        </select>

        <!-- Origin filter -->
        <select id="origin-filter" class="filter-select">
          <option value="">Origin (all)</option>
        </select>
      </div>
    </section>

    <section class="section section-map">
      <div class="section-inner">
        <div id="map" class="map-container"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>Powered by Airtable &amp; Leaflet • Hosted on GitHub Pages</p>
  </footer>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Our logic -->
  <script src="script.js"></script>
</body>
</html>
